name: SWA Deploy
description: Checkout, build, and deploy to Azure Static Web Apps

inputs:
  azure_static_web_apps_api_token:
    description: Azure SWA deployment token
    required: true
  app_location:
    description: App source code path
    required: false
    default: "/"
  api_location:
    description: API source code path
    required: false
    default: ""
  output_location:
    description: Built app content directory
    required: false
    default: "dist"

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        lfs: false

    - name: Build And Deploy
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ inputs.azure_static_web_apps_api_token }}
        repo_token: ${{ github.token }}
        action: upload
        app_location: ${{ inputs.app_location }}
        api_location: ${{ inputs.api_location }}
        output_location: ${{ inputs.output_location }}
