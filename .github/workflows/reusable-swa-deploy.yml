name: Reusable SWA Deploy

on:
  workflow_call:
    inputs:
      app_location:
        description: App source code path
        type: string
        default: "/"
      api_location:
        description: API source code path
        type: string
        default: ""
      output_location:
        description: Built app content directory
        type: string
        default: "dist"
    secrets:
      azure_static_web_apps_api_token:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.azure_static_web_apps_api_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ inputs.app_location }}
          api_location: ${{ inputs.api_location }}
          output_location: ${{ inputs.output_location }}
