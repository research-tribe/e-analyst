# Build on push to main, push image to ACR, deploy to Azure Container Apps.
#
# GitHub secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#
# Repository variables:
#   ACR_LOGIN_SERVER     – Full registry host (e.g. tnmonitor-bcdwa6ctajefhpfb.azurecr.io)
#   IMAGE_NAME           – Image repository name (e.g. tamil-nadu-economic-monitor)
#   CONTAINER_APP_NAME, RESOURCE_GROUP

name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  IMAGE_TAG: ${{ github.sha }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  IMAGE: ${{ vars.ACR_LOGIN_SERVER }}/${{ vars.IMAGE_NAME }}

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: |
          ACR_NAME="${{ vars.ACR_NAME }}"
          az acr login --name "$ACR_NAME"

      - name: Build and push image
        run: |
          docker build -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" .
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:latest"

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name "${{ vars.CONTAINER_APP_NAME }}" \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --image "$IMAGE:$IMAGE_TAG"
